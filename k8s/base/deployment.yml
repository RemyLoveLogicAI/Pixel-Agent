apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: pixel-agent
  labels:
    app.kubernetes.io/name: api-server
    app.kubernetes.io/part-of: pixel-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-server
        app.kubernetes.io/part-of: pixel-agent
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api-server
          image: ghcr.io/OWNER/pixel-agent:latest  # Replace OWNER
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: api-server-config
            - secretRef:
                name: api-server-secrets
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
