apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-server
  namespace: pixel-agent
  labels:
    app.kubernetes.io/name: api-server
    app.kubernetes.io/part-of: pixel-agent
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # SSE support for /api/companies/:id/events
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx
  rules:
    - host: api.pixel-agent.local  # Replace with real domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-server
                port:
                  name: http
