apiVersion: v1
kind: ConfigMap
metadata:
  name: api-server-config
  namespace: pixel-agent
  labels:
    app.kubernetes.io/name: api-server
    app.kubernetes.io/part-of: pixel-agent
data:
  PORT: "3000"
  NODE_ENV: "production"
  # Swarm orchestration defaults
  SWARM_MAX_CONCURRENT: "10"
  HEARTBEAT_INTERVAL_MS: "60000"
  AGENT_EXECUTION_TIMEOUT_MS: "30000"
  CIRCUIT_BREAKER_THRESHOLD: "3"
  CIRCUIT_BREAKER_TIMEOUT_MS: "60000"
